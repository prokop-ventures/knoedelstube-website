name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_sha: ${{ steps.meta.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-12)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/mail:latest
            ghcr.io/${{ github.repository }}/mail:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Sync compose file
        run: |
          scp -i ~/.ssh/id_ed25519 \
            infrastructure/docker-compose.yml \
            ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:/opt/knoedelstube/docker-compose.yml

      - name: Sync static files
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/id_ed25519" \
            --exclude '/server' \
            --exclude '/infrastructure' \
            --exclude '/.github' \
            --exclude '/.git' \
            --exclude '/node_modules' \
            --exclude '/temporary screenshots' \
            --exclude '/SETUP.md' \
            --exclude '/CLAUDE.md' \
            --exclude '/README.md' \
            --exclude '/serve.mjs' \
            --exclude '/screenshot.mjs' \
            --exclude '/steam-debug.mjs' \
            --exclude '/package.json' \
            --exclude '/package-lock.json' \
            --exclude '/.gitignore' \
            --exclude '/.dockerignore' \
            ./ ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:/opt/knoedelstube/static-web/

      - name: Pull & restart mail service
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE_TAG: ${{ needs.build.outputs.image_sha }}
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} \
            "cd /opt/knoedelstube && \
             echo '$GHCR_TOKEN' | docker login ghcr.io -u '$GHCR_USER' --password-stdin && \
             IMAGE_TAG='$IMAGE_TAG' docker compose pull && \
             IMAGE_TAG='$IMAGE_TAG' docker compose up -d"

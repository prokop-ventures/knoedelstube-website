<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="vendor/fonts/nunito-sans.css" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    position: relative;
    font-family: 'Nunito Sans', sans-serif;
    background-color: #215b63;
  }
  .bg {
    position: absolute;
    inset: 0;
    background-image: url('images/IMG_0802.jpg');
    background-size: cover;
    background-position: center 35%;
    filter: brightness(0.55) saturate(1.05);
  }
  .overlay {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(135deg, rgba(33,91,99,0.85) 0%, rgba(33,91,99,0.55) 45%, rgba(33,91,99,0.25) 100%),
      linear-gradient(to top, rgba(0,0,0,0.4) 0%, transparent 50%);
  }
  .content {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    padding: 60px 70px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    color: #fff;
  }
  .top { display: flex; align-items: center; gap: 16px; }
  .logo {
    height: 68px;
    filter: brightness(0) invert(1);
  }
  .headline {
    font-size: 84px;
    font-weight: 700;
    line-height: 1.0;
    letter-spacing: -0.03em;
    margin: 0;
    text-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .tagline {
    display: block;
    font-size: 44px;
    font-weight: 400;
    line-height: 1.0;
    letter-spacing: 0.02em;
    margin-top: 22px;
    color: rgba(255,255,255,0.92);
  }
  .tagline .sep {
    display: inline-block;
    margin: 0 14px;
    color: rgba(255,255,255,0.55);
    font-weight: 300;
  }
  .subtitle {
    font-size: 26px;
    font-weight: 400;
    line-height: 1.35;
    margin-top: 24px;
    color: rgba(255,255,255,0.88);
    max-width: 900px;
  }
  .bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #fff;
    color: #215b63;
    padding: 16px 26px;
    border-radius: 14px;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.03em;
  }
  .url {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: rgba(255,255,255,0.95);
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="content">
    <div class="top">
      <img class="logo" src="brand_assets/KS_Logo_Teal.png" alt="" />
    </div>
    <div>
      <h1 class="headline">Knödelstube Heilbronn<span class="tagline">ehrlich<span class="sep">|</span>tschechisch<span class="sep">|</span>lecker</span></h1>
      <p class="subtitle">Hausgemachte Knödel, Gulasch und frisch gezapftes Pilsner Urquell – mitten in Heilbronn.</p>
    </div>
    <div class="bottom">
      <span class="url">knoedelstube.de</span>
      <span class="cta">Jetzt Tisch reservieren →</span>
    </div>
  </div>
</body>
</html>
